name: Merge AltStore Sources

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

jobs:
  merge:
    permissions:
      contents: write

    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Axios
        run: npm install axios

      - name: Create merge script
        run: |
          cat > merge.js << 'EOF'
          const fs = require('fs');
          const axios = require('axios');

          const sources = [
            "https://repository.apptesters.org",
            "https://ipa.cypwn.xyz/cypwn.json",
            "https://quarksources.github.io/dist/quantumsource.min.json",
            "https://quarksources.github.io/dist/altstore-complete.min.json",
            "https://raw.githubusercontent.com/swaggyP36000/TrollStore-IPAs/main/apps.json",
            "https://raw.githubusercontent.com/swaggyP36000/TrollStore-IPAs/main/apps_esign.json",
            "https://wuxu1.github.io/wuxu-complete-plus.json",
            "https://wuxu1.github.io/wuxu-complete.json",
            "https://qnblackcat.github.io/AltStore/apps.json",
            "https://alt.crystall1ne.dev/",
            "https://altstore.oatmealdome.me/",
            "https://alt.getutm.app",
            "https://provenance-emu.com/apps.json",
            "https://theodyssey.dev/altstore/odysseysource.json",
            "https://taurine.app/altstore/taurinestore.json",
            "https://bunduuk.github.io/altstore-source/apps.json",
            "https://flyinghead.github.io/flycast-builds/altstore.json",
            "https://raw.githubusercontent.com/vizunchik/AltStoreRus/master/apps.json",
            "https://burritosoftware.github.io/altstore/channels.json",
            "https://raw.githubusercontent.com/Balackburn/YTLitePlusAltstore/main/apps.json",
            "https://raw.githubusercontent.com/arichornlover/AltStore-Repo/main/apps.json",
            "https://raw.githubusercontent.com/PojavLauncherTeam/PojavLauncher_iOS/main/apps.json"
          ];

          async function fetchJSON(url) {
            try {
              console.log("Fetching:", url);
              const response = await axios.get(url, {
                timeout: 30000,
                headers: { 'User-Agent': 'Mozilla/5.0 (compatible; AltStore-Merger/1.0)' }
              });

              let data = response.data;

              // بعض المصادر يكون الـ JSON ملفوف في key ثانوي
              if (data.data && data.data.apps) {
                data = data.data;
              }

              return data;
            } catch (e) {
              console.log("  ⚠️ Failed:", url, e.message);
              return null;
            }
          }

          async function mergeSources() {
            let allApps = [];
            const seenBundleIDs = {};

            for (const source of sources) {
              const data = await fetchJSON(source);
              if (!data) continue;

              let apps = [];
              if (data.apps && Array.isArray(data.apps)) {
                apps = data.apps;
              } else if (Array.isArray(data)) {
                apps = data;
              } else {
                console.log("  ⚠️ No apps array found");
                continue;
              }

              console.log("  ✅ Apps found:", apps.length);

              for (const app of apps) {
                const bundleID = app.bundleIdentifier;
                if (!bundleID) {
                  allApps.push(app);
                  continue;
                }

                if (seenBundleIDs[bundleID]) {
                  // دمج الإصدارات من مصادر مختلفة
                  const existing = seenBundleIDs[bundleID];
                  if (app.versions && Array.isArray(app.versions)) {
                    if (!existing.versions) existing.versions = [];
                    for (const v of app.versions) {
                      const exists = existing.versions.some(
                        ev => ev.version === v.version && ev.date === v.date
                      );
                      if (!exists) existing.versions.push(v);
                    }
                  }
                  // تحديث معلومات التطبيق إذا كانت أحدث
                  if (!existing.iconURL && app.iconURL) existing.iconURL = app.iconURL;
                  if (!existing.developerName && app.developerName) existing.developerName = app.developerName;
                } else {
                  seenBundleIDs[bundleID] = app;
                  allApps.push(app);
                }
              }
            }

            const output = {
              name: "Adnan Combined Store",
              identifier: "com.adnan.combined",
              subtitle: "Merged IPA Sources (Deduplicated)",
              description: "Auto-merged AltStore sources from 22+ repositories. Updated every 6 hours via GitHub Actions.",
              iconURL: "https://altstore.io/img/altstore-logo.png",
              headerURL: "https://raw.githubusercontent.com/quarksources/quarksources.github.io/master/icon.png",
              website: "https://github.com/",
              tintColor: "#3498db",
              apps: allApps,
              news: []
            };

            fs.writeFileSync("apps.json", JSON.stringify(output, null, 2));
            console.log("\n✅ Done! Total unique apps:", allApps.length);
          }

          mergeSources();
          EOF

      - name: Run Merge Script
        run: node merge.js

      - name: Commit apps.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps.json
          git diff --cached --quiet || git commit -m "chore: update merged AltStore sources [$(date +'%Y-%m-%d %H:%M')]"
          git push
