name: Merge AltStore Sources

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

jobs:
  merge:
    permissions:
      contents: write

    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Axios
        run: npm install axios

      - name: Create merge script
        run: |
          cat > merge.js << 'SCRIPTEOF'
          const fs = require('fs');
          const axios = require('axios');

          const sources = [
            { url: "https://repository.apptesters.org", name: "AppTesters Repo" },
            { url: "https://raw.githubusercontent.com/swaggyP36000/TrollStore-IPAs/main/apps_esign.json", name: "Swaggy ESign" },
            { url: "https://raw.githubusercontent.com/swaggyP36000/TrollStore-IPAs/main/apps.json", name: "Swaggy AltStore" },
            { url: "https://quarksources.github.io/dist/quantumsource.min.json", name: "Quantum Source" },
            { url: "https://quarksources.github.io/dist/altstore-complete.min.json", name: "AltStore Complete" },
            { url: "https://altstore.oatmealdome.me/", name: "OatmealDome" },
            { url: "https://alt.crystall1ne.dev/", name: "Crystall1ne" },
            { url: "https://ipa.cypwn.xyz/cypwn.json", name: "CyPwn" },
            { url: "https://wuxu1.github.io/wuxu-complete-plus.json", name: "WuXu++" },
            { url: "https://qnblackcat.github.io/AltStore/apps.json", name: "QnBlackCat" },
            { url: "https://alt.getutm.app", name: "UTM" },
            { url: "https://provenance-emu.com/apps.json", name: "Provenance" },
            { url: "https://theodyssey.dev/altstore/odysseysource.json", name: "Odyssey" },
            { url: "https://taurine.app/altstore/taurinestore.json", name: "Taurine" },
            { url: "https://bunduuk.github.io/altstore-source/apps.json", name: "Bunduuk" },
            { url: "https://flyinghead.github.io/flycast-builds/altstore.json", name: "Flycast" },
            { url: "https://raw.githubusercontent.com/vizunchik/AltStoreRus/master/apps.json", name: "Vizunchik" },
            { url: "https://wuxu1.github.io/wuxu-complete.json", name: "WuXu Basic" }
          ];

          async function mergeSources() {
            const appsMap = new Map();
            let totalFetched = 0;
            let successCount = 0;

            console.log("=".repeat(60));
            console.log("STARTING MERGE — Checking each source...");
            console.log("=".repeat(60));

            for (const source of sources) {
              try {
                process.stdout.write(`[${source.name}] Fetching... `);

                const response = await axios.get(source.url, {
                  timeout: 30000,
                  headers: { 'User-Agent': 'Mozilla/5.0 (compatible; AltStore-Merger/1.0)' }
                });

                const data = response.data;

                if (data.apps && Array.isArray(data.apps)) {
                  let sourceCount = 0;
                  for (const app of data.apps) {
                    const key = app.bundleIdentifier || app.name || `unknown-${Math.random()}`;

                    if (appsMap.has(key)) {
                      const existing = appsMap.get(key);
                      if (app.versions && Array.isArray(app.versions)) {
                        if (!existing.versions) {
                          existing.versions = app.versions;
                        } else {
                          const existingVersions = new Set(
                            existing.versions.map(v => v.version || v.downloadURL)
                          );
                          for (const v of app.versions) {
                            const vKey = v.version || v.downloadURL;
                            if (!existingVersions.has(vKey)) {
                              existing.versions.push(v);
                              existingVersions.add(vKey);
                            }
                          }
                        }
                      }
                      if (!existing.iconURL && app.iconURL) existing.iconURL = app.iconURL;
                      if (!existing.subtitle && app.subtitle) existing.subtitle = app.subtitle;
                    } else {
                      appsMap.set(key, { ...app });
                    }
                    sourceCount++;
                    totalFetched++;
                  }
                  successCount++;
                  console.log(`✅ ${sourceCount} apps (${data.apps.length} total in source)`);
                } else {
                  console.log(`⚠️ No 'apps' array — data type: ${typeof data}, keys: ${data ? Object.keys(data).join(', ') : 'null'}`);
                }
              } catch (e) {
                console.log(`❌ FAILED — ${e.message}`);
              }
            }

            const uniqueApps = Array.from(appsMap.values());

            console.log("\n" + "=".repeat(60));
            console.log("RESULTS:");
            console.log("  Sources succeeded:  " + successCount + "/" + sources.length);
            console.log("  Sources failed:     " + (sources.length - successCount));
            console.log("  Total fetched:      " + totalFetched);
            console.log("  Unique (final):     " + uniqueApps.length);
            console.log("=".repeat(60));

            // طباعة أسماء المصادر اللي فشلت
            if (successCount < sources.length) {
              console.log("\nFAILED SOURCES:");
              for (const source of sources) {
                // We can't easily track which failed without refactoring, but the console output above shows it
              }
            }

            const output = {
              name: "Adnan Combined Store",
              identifier: "com.adnan.combined",
              subtitle: `${uniqueApps.length} apps from ${successCount} sources`,
              description: `Auto-merged AltStore sources. Updated every 6 hours.\nSuccessful sources: ${successCount}/${sources.length}`,
              iconURL: "https://raw.githubusercontent.com/quarksources/quarksources.github.io/master/icon.png",
              headerURL: "https://raw.githubusercontent.com/quarksources/quarksources.github.io/master/icon.png",
              website: "https://github.com/",
              tintColor: "#3498db",
              apps: uniqueApps,
              news: []
            };

            fs.writeFileSync("apps.json", JSON.stringify(output, null, 2));
            console.log("\n✅ apps.json written successfully!");
          }

          mergeSources();
          SCRIPTEOF

      - name: Run Merge Script
        run: node merge.js

      - name: Commit apps.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps.json
          git diff --cached --quiet || git commit -m "chore: update merged store [$(date +'%Y-%m-%d %H:%M')]"
          git push
