name: Merge AltStore Sources

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

jobs:
  merge:
    permissions:
      contents: write

    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Axios
        run: npm install axios

      - name: Create merge script
        run: |
          cat > merge.js << 'SCRIPTEOF'
          const fs = require('fs');
          const axios = require('axios');

          const sources = [
            "https://raw.githubusercontent.com/swaggyP36000/TrollStore-IPAs/main/apps_esign.json",
            "https://raw.githubusercontent.com/swaggyP36000/TrollStore-IPAs/main/apps.json",
            "https://quarksources.github.io/dist/quantumsource.min.json",
            "https://quarksources.github.io/dist/altstore-complete.min.json",
            "https://altstore.oatmealdome.me/",
            "https://alt.crystall1ne.dev/",
            "https://ipa.cypwn.xyz/cypwn.json",
            "https://wuxu1.github.io/wuxu-complete-plus.json",
            "https://qnblackcat.github.io/AltStore/apps.json",
            "https://alt.getutm.app",
            "https://provenance-emu.com/apps.json",
            "https://theodyssey.dev/altstore/odysseysource.json",
            "https://taurine.app/altstore/taurinestore.json",
            "https://bunduuk.github.io/altstore-source/apps.json",
            "https://flyinghead.github.io/flycast-builds/altstore.json",
            "https://raw.githubusercontent.com/vizunchik/AltStoreRus/master/apps.json",
            "https://wuxu1.github.io/wuxu-complete.json"
          ];

          async function mergeSources() {
            const appsMap = new Map(); // key: bundleIdentifier, value: app object
            let totalFetched = 0;
            let failedSources = [];

            for (const source of sources) {
              try {
                console.log("Fetching:", source);

                const response = await axios.get(source, {
                  timeout: 20000,
                  headers: { 'User-Agent': 'Mozilla/5.0' }
                });

                const data = response.data;

                if (data.apps && Array.isArray(data.apps)) {
                  for (const app of data.apps) {
                    const key = app.bundleIdentifier || app.name || `unknown-${Math.random()}`;
                    
                    if (appsMap.has(key)) {
                      const existing = appsMap.get(key);
                      // دمج الإصدارات إذا كانت موجودة في التطبيق الجديد
                      if (app.versions && Array.isArray(app.versions)) {
                        if (!existing.versions) {
                          existing.versions = app.versions;
                        } else {
                          const existingVersions = new Set(
                            existing.versions.map(v => v.version || v.downloadURL)
                          );
                          for (const v of app.versions) {
                            const vKey = v.version || v.downloadURL;
                            if (!existingVersions.has(vKey)) {
                              existing.versions.push(v);
                              existingVersions.add(vKey);
                            }
                          }
                        }
                      }
                      // تحديث الأيقونات/المعلومات إذا كانت مفقودة
                      if (!existing.iconURL && app.iconURL) existing.iconURL = app.iconURL;
                      if (!existing.subtitle && app.subtitle) existing.subtitle = app.subtitle;
                    } else {
                      appsMap.set(key, { ...app });
                    }
                    
                    totalFetched++;
                  }
                  console.log(`  ✅ ${data.apps.length} apps`);
                } else {
                  console.log(`  ⚠️ No apps array found`);
                }
              } catch (e) {
                console.log(`  ❌ Failed: ${source} — ${e.message}`);
                failedSources.push(source);
              }
            }

            const uniqueApps = Array.from(appsMap.values());

            const output = {
              name: "Adnan Combined Store",
              identifier: "com.adnan.combined",
              subtitle: `${uniqueApps.length} apps from ${sources.length - failedSources.length} sources`,
              description: `Auto-merged AltStore sources. Updated every 6 hours.\nSources failed: ${failedSources.length > 0 ? failedSources.join(', ') : 'None'}`,
              iconURL: "https://raw.githubusercontent.com/quarksources/quarksources.github.io/master/icon.png",
              headerURL: "https://raw.githubusercontent.com/quarksources/quarksources.github.io/master/icon.png",
              website: "https://github.com/",
              tintColor: "#3498db",
              apps: uniqueApps,
              news: []
            };

            fs.writeFileSync("apps.json", JSON.stringify(output, null, 2));

            console.log(`\n✅ Done!`);
            console.log(`   Total apps fetched (with duplicates): ${totalFetched}`);
            console.log(`   Unique apps (deduplicated): ${uniqueApps.length}`);
            console.log(`   Sources failed: ${failedSources.length > 0 ? failedSources.join(', ') : 'None'}`);
          }

          mergeSources();
          SCRIPTEOF

      - name: Run Merge Script
        run: node merge.js

      - name: Commit apps.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps.json
          git diff --cached --quiet || git commit -m "chore: update merged store [$(date +'%Y-%m-%d %H:%M')]"
          git push
